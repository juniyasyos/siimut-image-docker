####################################################################################################
# Docker Compose Build - Multi-App
# 
# Purpose: Build SIIMUT, IKP, and IAM Server images with a single manifest.
# Use build.sh for tagging and Docker Hub push.
####################################################################################################

services:
  ####################################################################################################
  # SIIMUT Build Service
  ####################################################################################################
  siimut:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.siimut-registry
      args:
        UID: "1000"
        GID: "1000"
        TZ: "Asia/Jakarta"
        APP_NAME: "SIIMUT Application"
        APP_ENV: "production"
        APP_DIR: "siimut"
        DB_HOST: "database-service"
        DB_USERNAME: "siimut_user"
        DB_PASSWORD: "siimut-password"
        DB_DATABASE: "siimut_db"
        AWS_ACCESS_KEY_ID: "admin"
        AWS_SECRET_ACCESS_KEY: "password"
        AWS_BUCKET: "siimut"
        AWS_URL: "http://minio:9090/siimut"
        AWS_ENDPOINT: "http://minio:9090"
        BUILD_TIMESTAMP: "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
    image: siimut:${SIIMUT_VERSION:-latest}
    pull_policy: never

  ####################################################################################################
  # IKP Build Service
  ####################################################################################################
  ikp:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.ikp-registry
      args:
        UID: "1000"
        GID: "1000"
        TZ: "Asia/Jakarta"
        APP_NAME: "IKP Application"
        APP_ENV: "local"
        APP_DEBUG: true
        APP_DIR: "ikp"
        DB_HOST: "database-service"
        DB_USERNAME: "ikp_user"
        DB_PASSWORD: "ikp-password"
        DB_DATABASE: "ikp_db"
        AWS_ACCESS_KEY_ID: "admin"
        AWS_SECRET_ACCESS_KEY: "password"
        AWS_BUCKET: "ikp"
        AWS_URL: "http://minio:9090/ikp"
        AWS_ENDPOINT: "http://minio:9090"
        BUILD_TIMESTAMP: "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
    image: ikp:${IKP_VERSION:-latest}
    pull_policy: never

  ####################################################################################################
  # IAM Server Build Service
  ####################################################################################################
  iam-server:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.iam-registry
      args:
        UID: "1000"
        GID: "1000"
        TZ: "Asia/Jakarta"
        APP_NAME: "IAM Server"
        APP_ENV: "production"
        APP_DIR: "iam-server"
        BUILD_TIMESTAMP: "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
    image: iam-server:${IAM_VERSION:-latest}
    pull_policy: never
