  ###################################################################################################
  # End Section: Apps - Production Application
  ###################################################################################################
  ###################################################################################################

####################################################################################################
# Named Volumes - Multi-App Setup (Database and base infra from compose.base.yml)
####################################################################################################
volumes:
  # Web server data
  nginx_logs:
    driver: local

  # ====== PUBLIC ASSETS (untuk Nginx serve static files) ======
  siimut_public:
    driver: local
  # ikp_public:
  #   driver: local
  iam_public:
    driver: local

  # ====== DATA PERSISTEN LARAVEL (tanpa vendor) ======
  # SIIMUT
  siimut_storage:
    driver: local
  siimut_bootstrap_cache:
    driver: local

  # IKP
  # ikp_storage:
  #   driver: local
  # ikp_bootstrap_cache:
  #   driver: local

  # # IAM
  iam_storage:
    driver: local
  iam_bootstrap_cache:
    driver: local

####################################################################################################
# Networks - Using default from compose.base.yml
####################################################################################################
networks:
  default:
    name: rsch-srv_default
    external: true