name: service-ikp

services:
  app:
    extends:
      file: ../compose.common.yml
      service: php-app-base
    image: ikp:v1.3.0
    container_name: ikp-app
    working_dir: /var/www/ikp
    env_file:
      - ../env/.env.ikp
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_WORKDIR: /var/www/ikp
      PUBLIC_VOLUME: /var/www/ikp/public
      APP_URL: "http://192.168.1.4:8200"
      TRUSTED_PROXIES: "*"
      DB_HOST: database-service
      DB_USERNAME: ikp_user
      DB_PASSWORD: ikp-password
      DB_DATABASE: ikp_db
      SKIP_PUBLIC_SYNC: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_BUCKET: ikp
      AWS_URL: http://192.168.1.4:9090/ikp
      AWS_ENDPOINT: http://192.168.1.4:9090
      MEDIA_DISK: s3
      USE_SSO: "true"
      IAM_ENABLED: "true"
      IAM_HOST: "http://192.168.1.4:8100"
      IAM_BASE_URL: "http://192.168.1.4:8100"
      IAM_ISSUER: "http://192.168.1.4:8100"
      IAM_VERIFY_ENDPOINT: "http://web:8100/api/sso/verify"
      IAM_REFRESH_TOKEN_ENDPOINT: "http://web:8100/api/sso/token/refresh"
      IAM_BACKCHANNEL_USER_APPLICATIONS_ENDPOINT: "http://web:8100/api/users/applications/detail"
      IAM_LOGIN_ROUTE: "/login"
      IAM_CALLBACK_ROUTE: "/callback"
      IAM_APP_KEY: "incident-reporting"
    volumes:
      - ikp_storage:/var/www/ikp/storage
      - ikp_bootstrap_cache:/var/www/ikp/bootstrap/cache
      - ikp_public:/var/www/ikp/public
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 512M
          cpus: "0.5"

  queue:
    extends:
      file: ../compose.common.yml
      service: php-worker-base
    image: ikp:v1.3.0
    container_name: ikp-queue
    working_dir: /var/www/ikp
    env_file:
      - ../env/.env.ikp
    environment:
      APP_ENV: production
      DB_HOST: database-service
      DB_USERNAME: ikp_user
      DB_PASSWORD: ikp-password
    volumes:
      - ikp_storage:/var/www/ikp/storage
      - ikp_bootstrap_cache:/var/www/ikp/bootstrap/cache
    command: >
      artisan queue:work
        --sleep=5
        --tries=3
        --timeout=120
        --max-jobs=500
        --max-time=3600
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.7"
        reservations:
          memory: 128M
          cpus: "0.25"

  scheduler:
    extends:
      file: ../compose.common.yml
      service: php-scheduler-base
    image: ikp:v1.3.0
    container_name: ikp-scheduler
    working_dir: /var/www/ikp
    env_file:
      - ../env/.env.ikp
    environment:
      APP_ENV: production
      DB_HOST: database-service
      DB_USERNAME: ikp_user
      DB_PASSWORD: ikp-password
    volumes:
      - ikp_storage:/var/www/ikp/storage
      - ikp_bootstrap_cache:/var/www/ikp/bootstrap/cache
    command: >
      artisan schedule:work
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
        reservations:
          memory: 64M
          cpus: "0.1"