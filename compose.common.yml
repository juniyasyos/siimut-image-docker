name: service-app-common

services:
  php-app-base:
    pull_policy: missing
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  php-worker-base:
    pull_policy: missing
    restart: unless-stopped
    entrypoint: ["php"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  php-scheduler-base:
    pull_policy: missing
    restart: unless-stopped
    entrypoint: ["php"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s