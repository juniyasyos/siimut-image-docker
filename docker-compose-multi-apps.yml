name: service-app-multi

services:
  ####################################################################################################
  # Nginx Web Server - Production Optimized (Multi-App Support)
  ####################################################################################################
  web:
    image: nginx:alpine
    container_name: ${STACK_NAME:-multi}-web
    ports:
      - "8000:8000"  # SIIMUT
      # - "8200:8200"  # IKP
      # - "8100:8100"  # IAM Server
    volumes:
      - ./DockerNew/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./DockerNew/nginx/nginx-multi-apps.conf:/etc/nginx/conf.d/default.conf:ro
      # SIIMUT
      - siimut_public:/var/www/siimut/public:ro
      - siimut_storage:/var/www/siimut/storage:ro
      # # IKP
      # - ikp_public:/var/www/ikp/public:ro
      # - ikp_storage:/var/www/ikp/storage:ro
      # # IAM (optional)
      # - iam_public:/var/www/iam/public:ro
      # - nginx_logs:/var/log/nginx
    depends_on:
      app-siimut:
        condition: service_healthy
      # app-ikp:
      #   condition: service_healthy
      # app-iam:
      #   condition: service_healthy
    restart: unless-stopped
    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ####################################################################################################
  ####################################################################################################
  # Section : Apps - Production Application
  ####################################################################################################
  ####################################################################################################

  ####################################################################################################
  # Apps SIIMUT
  # Image built with: docker-compose -f docker-compose-build.yml build && ./build.sh push
  # Pulled from Docker Hub: juniyasyos/siimut:VERSION
  ####################################################################################################
  app-siimut:
    image: siimut:v3.1.0
    # image: juniyasyos/siimut:v3.1.0
    pull_policy: missing
    container_name: siimut-app
    working_dir: /var/www/siimut
    env_file:
      - ./env/.env.siimut
    environment:
      APP_ENV: production
      APP_WORKDIR: /var/www/siimut
      PUBLIC_VOLUME: /var/www/siimut/public
      APP_URL: "http://192.168.1.4:8000"
      TRUSTED_PROXIES: "*"
      DB_HOST: database-service
      DB_USERNAME: siimut_user
      DB_PASSWORD: siimut-password
      DB_DATABASE: siimut_db
      SKIP_PUBLIC_SYNC: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_BUCKET: siimut
      AWS_URL: http://192.168.1.4:9090/siimut
      AWS_ENDPOINT: http://minio:9090
      # SSO Configuration - Override from compose
      USE_SSO: "false"
      IAM_ENABLED: "false"
      # User browser OAuth/login should point to public gateway URL.
      IAM_HOST: "http://192.168.1.4:8100"
      IAM_BASE_URL: "http://192.168.1.4:8100"
      IAM_ISSUER: "http://192.168.1.4:8100"
      # Internal container verification & API calls use Docker network service name
      IAM_VERIFY_ENDPOINT: "http://web:8100/api/sso/verify"
      IAM_REFRESH_TOKEN_ENDPOINT: "http://web:8100/api/sso/token/refresh"
      IAM_BACKCHANNEL_USER_APPLICATIONS_ENDPOINT: "http://web:8100/api/users/applications/detail"
      IAM_LOGIN_ROUTE: "/siimut/login"
      IAM_CALLBACK_ROUTE: "/sso/callback"
      IAM_APP_KEY: "siimut"
    volumes:
      # Self-contained image - NO code mounts needed
      # Only persistent data volumes
      - siimut_storage:/var/www/siimut/storage
      - siimut_bootstrap_cache:/var/www/siimut/bootstrap/cache
      - siimut_public:/var/www/siimut/public  # Shared volume (public assets)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
        reservations:
          memory: 768M
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  queue-siimut:
    image: siimut:v3.1.0
    # image: juniyasyos/siimut:v3.1.0
    pull_policy: missing
    container_name: siimut-queue
    working_dir: /var/www/siimut
    environment:
      DB_HOST: database-service
      DB_USER: siimut_user
      DB_PASSWORD: siimut-password
    volumes:
      - siimut_storage:/var/www/siimut/storage
      - siimut_bootstrap_cache:/var/www/siimut/bootstrap/cache
    entrypoint: ["php"]
    command: >
      artisan queue:work
        --sleep=5
        --tries=3
        --timeout=120
        --max-jobs=500
        --max-time=3600
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduler-siimut:
    image: siimut:v3.1.0
    # image: juniyasyos/siimut:v3.1.0
    pull_policy: missing
    container_name: siimut-scheduler
    working_dir: /var/www/siimut
    environment:
      DB_HOST: database-service
      DB_USER: siimut_user
      DB_PASSWORD: siimut-password
    volumes:
      - siimut_storage:/var/www/siimut/storage
      - siimut_bootstrap_cache:/var/www/siimut/bootstrap/cache
    entrypoint: ["php"]
    command: >
      artisan schedule:work
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"   # dikurangi sedikit
        reservations:
          memory: 128M
          cpus: "0.125"
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


