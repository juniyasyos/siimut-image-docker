name: service-app-three

services:
  ####################################################################################################
  # Nginx Web Server - Production Optimized
  ####################################################################################################
  web:
    image: nginx:alpine
    container_name: ${STACK_NAME:-three-apps}-web
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./DockerNew/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./DockerNew/nginx/nginx-multi-apps.conf:/etc/nginx/conf.d/default.conf:ro
      # SIIMUT
      - siimut_public:/var/www/siimut/public:ro
      - siimut_storage:/var/www/siimut/storage:ro
      # IKP
      - ikp_public:/var/www/ikp/public:ro
      - ikp_storage:/var/www/ikp/storage:ro
      # IAM (optional)
      # - iam_public:/var/www/iam/public:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app-siimut:
        condition: service_healthy
      app-ikp:
        condition: service_healthy
      # app-iam:
      #   condition: service_healthy
    restart: unless-stopped
    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.2"
        reservations:
          memory: 128M
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rsch_network

  ####################################################################################################
  ####################################################################################################
  # Section : Database - MariaDB
  ####################################################################################################
  ####################################################################################################

  database-service:
    image: mariadb:10.11
    container_name: ${STACK_NAME:-three-apps}-db
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql
      - db_logs:/var/log/mysql
      - ./DockerNew/db/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_db}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app-password}
      MYSQL_RANDOM_ROOT_PASSWORD: "no"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rsch_network

  ####################################################################################################
  ####################################################################################################
  # Section : Apps - Production Application
  ####################################################################################################
  ####################################################################################################

  ####################################################################################################
  # Apps SIIMUT
  ####################################################################################################
  app-siimut:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.siimut-registry
      args:
        APP_DIR: siimut
        APP_NAME: "SIIMUT Application"
        APP_ENV: production
        DB_HOST: database-service
        DB_USERNAME: siimut_user
        DB_PASSWORD: siimut-password
        DB_DATABASE: siimut_db
        AWS_ACCESS_KEY_ID: admin
        AWS_SECRET_ACCESS_KEY: password
        AWS_BUCKET: siimut
        AWS_URL: http://192.168.1.9:9090/siimut
        AWS_ENDPOINT: http://minio:9090
    container_name: siimut-app
    working_dir: /var/www/siimut
    environment:
      APP_ENV: production
      APP_WORKDIR: /var/www/siimut
      PUBLIC_VOLUME: /var/www/siimut/public
      APP_URL: "http://192.168.1.9:8000"
      DB_HOST: database-service
      DB_USERNAME: siimut_user
      DB_PASSWORD: siimut-password
      DB_DATABASE: siimut_db
      SKIP_PUBLIC_SYNC: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_BUCKET: siimut
      AWS_URL: http://192.168.1.9:9090/siimut
      AWS_ENDPOINT: http://minio:9090
      USE_SSO: "false"
      IAM_ENABLED: "false"
    volumes:
      - siimut_storage:/var/www/siimut/storage
      - siimut_bootstrap_cache:/var/www/siimut/bootstrap/cache
      - siimut_public:/var/www/siimut/public
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
        reservations:
          memory: 768M
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rsch_network
    depends_on:
      database-service:
        condition: service_healthy

  queue-siimut:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.siimut-registry
      args:
        APP_DIR: siimut
        APP_NAME: "SIIMUT Application"
        APP_ENV: production
        DB_HOST: database-service
        DB_USERNAME: siimut_user
        DB_PASSWORD: siimut-password
        DB_DATABASE: siimut_db
        AWS_ACCESS_KEY_ID: admin
        AWS_SECRET_ACCESS_KEY: password
        AWS_BUCKET: siimut
        AWS_URL: http://192.168.1.9:9090/siimut
        AWS_ENDPOINT: http://minio:9090
    container_name: siimut-queue
    working_dir: /var/www/siimut
    environment:
      DB_HOST: database-service
      DB_USER: siimut_user
      DB_PASSWORD: siimut-password
    volumes:
      - siimut_storage:/var/www/siimut/storage
      - siimut_bootstrap_cache:/var/www/siimut/bootstrap/cache
    entrypoint: ["php"]
    command: >
      artisan queue:work
        --sleep=5
        --tries=3
        --timeout=120
        --max-jobs=500
        --max-time=3600
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - rsch_network
    depends_on:
      database-service:
        condition: service_healthy

  scheduler-siimut:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.siimut-registry
      args:
        APP_DIR: siimut
        APP_NAME: "SIIMUT Application"
        APP_ENV: production
        DB_HOST: database-service
        DB_USERNAME: siimut_user
        DB_PASSWORD: siimut-password
        DB_DATABASE: siimut_db
        AWS_ACCESS_KEY_ID: admin
        AWS_SECRET_ACCESS_KEY: password
        AWS_BUCKET: siimut
        AWS_URL: http://192.168.1.9:9090/siimut
        AWS_ENDPOINT: http://minio:9090
    container_name: siimut-scheduler
    working_dir: /var/www/siimut
    environment:
      DB_HOST: database-service
      DB_USER: siimut_user
      DB_PASSWORD: siimut-password
    volumes:
      - siimut_storage:/var/www/siimut/storage
      - siimut_bootstrap_cache:/var/www/siimut/bootstrap/cache
    entrypoint: ["php"]
    command: >
      artisan schedule:work
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.125"
    networks:
      - rsch_network
    depends_on:
      database-service:
        condition: service_healthy

  ####################################################################################################
  # Apps IKP (New Application)
  ####################################################################################################
  app-ikp:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.ikp-registry
      args:
        APP_DIR: ikp
        APP_NAME: "IKP Application"
        APP_ENV: production
        DB_HOST: database-service
        DB_USERNAME: ikp_user
        DB_PASSWORD: ikp-password
        DB_DATABASE: ikp_db
        AWS_ACCESS_KEY_ID: admin
        AWS_SECRET_ACCESS_KEY: password
        AWS_BUCKET: ikp
        AWS_URL: http://192.168.1.9:9090/ikp
        AWS_ENDPOINT: http://minio:9090
    container_name: ikp-app
    working_dir: /var/www/ikp
    environment:
      APP_ENV: production
      APP_WORKDIR: /var/www/ikp
      PUBLIC_VOLUME: /var/www/ikp/public
      APP_URL: "http://192.168.1.9:8001"
      DB_HOST: database-service
      DB_USERNAME: ikp_user
      DB_PASSWORD: ikp-password
      DB_DATABASE: ikp_db
      SKIP_PUBLIC_SYNC: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_BUCKET: ikp
      AWS_URL: http://192.168.1.9:9090/ikp
      AWS_ENDPOINT: http://minio:9090
    volumes:
      - ikp_storage:/var/www/ikp/storage
      - ikp_bootstrap_cache:/var/www/ikp/bootstrap/cache
      - ikp_public:/var/www/ikp/public
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1.5"
        reservations:
          memory: 768M
          cpus: "0.75"
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rsch_network
    depends_on:
      database-service:
        condition: service_healthy

  queue-ikp:
    build:
      context: .
      dockerfile: DockerNew/php/Dockerfile.ikp-registry
      args:
        APP_DIR: ikp
        APP_NAME: "IKP Application"
        APP_ENV: production
        DB_HOST: database-service
        DB_USERNAME: ikp_user
        DB_PASSWORD: ikp-password
        DB_DATABASE: ikp_db
        AWS_ACCESS_KEY_ID: admin
        AWS_SECRET_ACCESS_KEY: password
        AWS_BUCKET: ikp
        AWS_URL: http://192.168.1.9:9090/ikp
        AWS_ENDPOINT: http://minio:9090
    container_name: ikp-queue
    working_dir: /var/www/ikp
    environment:
