name: service-iam

services:
  app:
    extends:
      file: ../compose.common.yml
      service: php-app-base
    image: iam-server:v2.1.0
    container_name: iam-app
    working_dir: /var/www/iam
    env_file:
      - ../env/.env.iam
    environment:
      APP_ENV: production
      TRUSTED_PROXIES: "*"
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "0"
      APP_WORKDIR: /var/www/iam
      PUBLIC_VOLUME: /var/www/public-shared-iam
      DB_HOST: database-service
      APP_URL: "http://192.168.1.4:8100"
      IAM_ISSUER: "http://192.168.1.4:8100"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: data-center
      AWS_URL: http://192.168.1.4:9090/data-center
      AWS_ENDPOINT: http://192.168.1.4:9090
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      MEDIA_DISK: s3
    volumes:
      - iam_storage:/var/www/iam/storage
      - iam_bootstrap_cache:/var/www/iam/bootstrap/cache
      - iam_public:/var/www/public-shared-iam
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      default:
        aliases:
          - iam-app

  queue:
    extends:
      file: ../compose.common.yml
      service: php-worker-base
    image: iam-server:v2.1.0
    container_name: iam-queue
    working_dir: /var/www/iam
    env_file:
      - ../env/.env.iam
    environment:
      APP_ENV: production
      APP_URL: "http://192.168.1.4:8100"
      IAM_ISSUER: "http://192.168.1.4:8100"
      DB_HOST: database-service
      DB_USER: iam_user
      DB_PASSWORD: iam-password
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: data-center
      AWS_URL: http://192.168.1.4:9090/data-center
      AWS_ENDPOINT: http://minio:9090
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - iam_storage:/var/www/iam/storage
      - iam_bootstrap_cache:/var/www/iam/bootstrap/cache
    command: >
      php artisan queue:work
        --sleep=5
        --tries=3
        --timeout=120
        --max-jobs=500
        --max-time=3600
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  scheduler:
    extends:
      file: ../compose.common.yml
      service: php-scheduler-base
    image: iam-server:v2.1.0
    container_name: iam-scheduler
    working_dir: /var/www/iam
    env_file:
      - ../env/.env.iam
    environment:
      APP_ENV: production
      APP_URL: "http://192.168.1.4:8100"
      IAM_ISSUER: "http://192.168.1.4:8100"
      DB_HOST: database-service
      DB_USER: iam_user
      DB_PASSWORD: iam-password
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: data-center
      AWS_URL: http://192.168.1.4:9090/data-center
      AWS_ENDPOINT: http://minio:9090
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    volumes:
      - iam_storage:/var/www/iam/storage
      - iam_bootstrap_cache:/var/www/iam/bootstrap/cache
    command: >
      php artisan schedule:work
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
        reservations:
          memory: 64M
          cpus: "0.1"