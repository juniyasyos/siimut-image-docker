name: service-app-multi

services:
  ####################################################################################################
  # Nginx Web Server - Production Optimized (Multi-App Support)
  ####################################################################################################
  web:
    image: nginx:alpine
    container_name: ${STACK_NAME:-multi}-web
    ports:
      - "${SIIMUT_HOST_PORT:-8000}:8000"  # SIIMUT
      - "${IKP_HOST_PORT:-8200}:8200"  # IKP
      - "${IAM_HOST_PORT:-8100}:8100"  # IAM Server
    volumes:
      - ./DockerNew/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./DockerNew/nginx/nginx-multi-apps.conf:/etc/nginx/conf.d/default.conf:ro
      # SIIMUT
      - siimut_public:/var/www/siimut/public:ro
      - siimut_storage:/var/www/siimut/storage:ro
      # IKP
      - ikp_public:/var/www/ikp/public:ro
      - ikp_storage:/var/www/ikp/storage:ro
      # # IAM (optional)
      - iam_public:/var/www/iam/public:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      app-siimut:
        condition: service_healthy
      app-ikp:
        condition: service_healthy
      app-iam:
        condition: service_healthy
    restart: unless-stopped
    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 128M
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ####################################################################################################
  ####################################################################################################
  # Section : Apps - Production Application
  ####################################################################################################
  ####################################################################################################

  ####################################################################################################
  # Apps SIIMUT
  # Image built with: docker-compose -f docker-compose-build.yml build && ./build.sh push
  # Pulled from Docker Hub: juniyasyos/siimut:VERSION
  ####################################################################################################
  app-siimut:
    extends:
      file: compose.apps/siimut.yml
      service: app

  queue-siimut:
    extends:
      file: compose.apps/siimut.yml
      service: queue

  scheduler-siimut:
    extends:
      file: compose.apps/siimut.yml
      service: scheduler


  ####################################################################################################
  # Apps IKP (New Application)
  ####################################################################################################
  app-ikp:
    extends:
      file: compose.apps/ikp.yml
      service: app

  queue-ikp:
    extends:
      file: compose.apps/ikp.yml
      service: queue

  scheduler-ikp:
    extends:
      file: compose.apps/ikp.yml
      service: scheduler


  ####################################################################################################
  # Apps IAM
  ####################################################################################################
  app-iam:
    extends:
      file: compose.apps/iam.yml
      service: app

  queue-iam:
    extends:
      file: compose.apps/iam.yml
      service: queue

  scheduler-iam:
    extends:
      file: compose.apps/iam.yml
      service: scheduler

  ###################################################################################################
  ###################################################################################################
  # End Section: Apps - Production Application
  ###################################################################################################
  ###################################################################################################

####################################################################################################
# Named Volumes - Multi-App Setup (Database and base infra from compose.base.yml)
####################################################################################################
volumes:
  # Web server data
  nginx_logs:
    driver: local

  # ====== PUBLIC ASSETS (untuk Nginx serve static files) ======
  siimut_public:
    driver: local
  ikp_public:
    driver: local
  iam_public:
    driver: local

  # ====== DATA PERSISTEN LARAVEL (tanpa vendor) ======
  # SIIMUT
  siimut_storage:
    driver: local
  siimut_bootstrap_cache:
    driver: local

  # IKP
  ikp_storage:
    driver: local
  ikp_bootstrap_cache:
    driver: local

  # # IAM
  iam_storage:
    driver: local
  iam_bootstrap_cache:
    driver: local

####################################################################################################
# Networks - Using default from compose.base.yml
####################################################################################################
networks:
  default:
    name: rsch-srv_default
    external: true