  #   healthcheck:
  #     test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php artisan --version >/dev/null 2>&1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #   networks:
  #     - rsch_network

  ###################################################################################################
  ###################################################################################################
  # End Section: Apps - Production Application
  ###################################################################################################
  ###################################################################################################

####################################################################################################
# Named Volumes - Production Optimized (Multi Laravel Apps)
####################################################################################################
volumes:
  # Web server data
  nginx_logs:
    driver: local

  # Database
  db_data:
    driver: local
  db_logs:
    driver: local

  # ====== PUBLIC ASSETS (untuk Nginx serve static files) ======
  siimut_public:
    driver: local
  ikp_public:
    driver: local
  # iam_public:
  #   driver: local

  # ====== DATA PERSISTEN LARAVEL ======
  # SIIMUT
  siimut_storage:
    driver: local
  siimut_bootstrap_cache:
    driver: local

  # IKP
  ikp_storage:
    driver: local
  ikp_bootstrap_cache:
    driver: local

  # # IAM
  # iam_storage:
  #   driver: local
  # iam_bootstrap_cache:
  #   driver: local

####################################################################################################
# Networks - Production Security
####################################################################################################
networks:
  rsch_network:
    driver: bridge
